<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexusAI Career Advisor</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Manrope:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #07080d;
      --surface: #0e1018;
      --surface2: #151822;
      --border: rgba(255, 255, 255, 0.07);
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --accent3: #ff6b6b;
      --gold: #f5c842;
      --text: #e8eaf0;
      --muted: #6b7280;
      --font-display: 'Outfit', sans-serif;
      --font-body: 'Manrope', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow-x: hidden;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 4px;
    }

    .noise::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: .03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    .grid-bg {
      background-image: linear-gradient(rgba(108, 99, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108, 99, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .glow {
      box-shadow: 0 0 40px rgba(108, 99, 255, 0.15), 0 0 80px rgba(108, 99, 255, 0.05);
    }

    .glow-teal {
      box-shadow: 0 0 40px rgba(0, 212, 170, 0.12);
    }

    .glow-gold {
      box-shadow: 0 0 30px rgba(245, 200, 66, 0.15);
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 16px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(7, 8, 13, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.2rem;
      background: linear-gradient(135deg, #6c63ff, #00d4aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-links {
      display: flex;
      gap: 8px;
    }

    .nav-btn {
      padding: 6px 16px;
      border-radius: 8px;
      font-size: .8rem;
      cursor: pointer;
      font-family: var(--font-body);
      font-weight: 500;
      border: none;
      transition: .2s;
      background: transparent;
      color: var(--muted);
    }

    .nav-btn:hover {
      color: var(--text);
      background: var(--surface2);
    }

    .nav-btn.active {
      color: var(--accent);
      background: rgba(108, 99, 255, 0.1);
    }

    .nav-cta {
      background: var(--accent) !important;
      color: #fff !important;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-user {
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: .75rem;
      font-family: var(--font-mono);
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 40px 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }

    .hero-orb-1 {
      width: 500px;
      height: 500px;
      background: rgba(108, 99, 255, 0.15);
      top: -100px;
      left: -100px;
    }

    .hero-orb-2 {
      width: 400px;
      height: 400px;
      background: rgba(0, 212, 170, 0.08);
      bottom: -50px;
      right: -50px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border: 1px solid rgba(108, 99, 255, 0.4);
      border-radius: 100px;
      font-size: .75rem;
      font-family: var(--font-mono);
      color: var(--accent);
      margin-bottom: 32px;
      background: rgba(108, 99, 255, 0.05);
    }

    .hero-badge span {
      width: 6px;
      height: 6px;
      background: var(--accent2);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .5;
        transform: scale(1.4)
      }
    }

    h1.hero-title {
      font-family: var(--font-display);
      font-size: clamp(2.8rem, 6vw, 5.5rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -2px;
      margin-bottom: 24px;
    }

    .hero-title .line-accent {
      background: linear-gradient(90deg, #6c63ff, #00d4aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-sub {
      font-size: 1.15rem;
      color: var(--muted);
      max-width: 560px;
      line-height: 1.7;
      margin-bottom: 48px;
    }

    .hero-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-primary {
      padding: 14px 32px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: .2s;
    }

    .btn-primary:hover {
      background: #5b52e8;
      transform: translateY(-1px);
    }

    .btn-ghost {
      padding: 14px 32px;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: var(--font-body);
      font-weight: 500;
      cursor: pointer;
      transition: .2s;
    }

    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .hero-stats {
      display: flex;
      gap: 48px;
      margin-top: 64px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat strong {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #6c63ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-stat p {
      font-size: .8rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .features-strip {
      padding: 80px 40px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-label {
      font-family: var(--font-mono);
      font-size: .72rem;
      color: var(--accent2);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .section-title {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 3.5vw, 3rem);
      font-weight: 800;
      margin-bottom: 48px;
      letter-spacing: -1px;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .feature-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      transition: .3s;
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .feature-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: .3s;
      background: linear-gradient(135deg, rgba(108, 99, 255, 0.05), transparent);
    }

    .feature-card:hover {
      border-color: rgba(108, 99, 255, 0.3);
      transform: translateY(-2px);
    }

    .feature-card:hover::before {
      opacity: 1;
    }

    .feature-icon {
      font-size: 2rem;
      margin-bottom: 16px;
    }

    .feature-card h3 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.05rem;
      margin-bottom: 8px;
    }

    .feature-card p {
      font-size: .85rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .page,
    .dashboard,
    .compare-page,
    .roadmap-page,
    .whatif-page,
    .chat-page,
    .trends-page,
    .journeys-page,
    .college-page,
    .login-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 100px 40px 80px;
      min-height: 100vh;
    }

    .login-page {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      width: min(460px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
    }

    .auth-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 22px;
    }

    .auth-tab {
      flex: 1;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-family: var(--font-body);
      cursor: pointer;
    }

    .auth-tab.active {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(108, 99, 255, 0.08);
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .auth-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: .92rem;
      outline: none;
    }

    .auth-input:focus {
      border-color: var(--accent);
    }

    .auth-error {
      color: var(--accent3);
      font-size: .82rem;
      min-height: 1.2em;
    }

    .auth-note {
      color: var(--muted);
      font-size: .78rem;
      line-height: 1.5;
      margin-top: 10px;
    }

    .page-header {
      margin-bottom: 48px;
    }

    .progress-bar {
      height: 4px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 32px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px;
      transition: .4s;
    }

    .q-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
    }

    .q-number {
      font-family: var(--font-mono);
      font-size: .75rem;
      color: var(--accent2);
      margin-bottom: 16px;
    }

    .q-text {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 32px;
      line-height: 1.4;
    }

    .q-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .q-option {
      padding: 16px 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: .2s;
      font-size: .95rem;
      text-align: left;
      font-family: var(--font-body);
      color: var(--text);
    }

    .q-option:hover {
      border-color: var(--accent);
      background: rgba(108, 99, 255, 0.08);
    }

    .q-option.selected {
      border-color: var(--accent);
      background: rgba(108, 99, 255, 0.12);
      color: var(--accent);
    }

    .q-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 32px;
    }

    .dash-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
      margin-top: 32px;
    }

    .career-cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .career-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      gap: 20px;
      align-items: flex-start;
      transition: .3s;
      cursor: pointer;
    }

    .career-card:hover {
      border-color: rgba(108, 99, 255, 0.3);
    }

    .career-card.top {
      border-color: rgba(245, 200, 66, 0.4);
      background: rgba(245, 200, 66, 0.03);
    }

    .career-rank {
      font-family: var(--font-mono);
      font-size: .7rem;
      color: var(--muted);
    }

    .career-info {
      flex: 1;
    }

    .career-info h3 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 6px;
    }

    .career-info p {
      font-size: .85rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .career-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .tag {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: .72rem;
      font-family: var(--font-mono);
    }

    .tag-purple {
      background: rgba(108, 99, 255, 0.15);
      color: var(--accent);
    }

    .tag-teal {
      background: rgba(0, 212, 170, 0.12);
      color: var(--accent2);
    }

    .tag-gold {
      background: rgba(245, 200, 66, 0.12);
      color: var(--gold);
    }

    .tag-red {
      background: rgba(255, 107, 107, 0.12);
      color: var(--accent3);
    }

    .match-score {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 2rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }

    .panel-card h4 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: .95rem;
      margin-bottom: 16px;
      color: var(--muted);
      letter-spacing: .5px;
    }

    .skill-bar-wrap {
      margin-bottom: 12px;
    }

    .skill-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: .8rem;
      margin-bottom: 6px;
    }

    .skill-bar {
      height: 6px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
    }

    .skill-fill {
      height: 100%;
      border-radius: 4px;
      transition: .8s;
    }

    .compare-selector {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .career-pill {
      padding: 8px 18px;
      border: 1px solid var(--border);
      border-radius: 100px;
      cursor: pointer;
      font-size: .85rem;
      background: var(--surface);
      transition: .2s;
    }

    .career-pill:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .career-pill.selected {
      border-color: var(--accent);
      background: rgba(108, 99, 255, 0.1);
      color: var(--accent);
    }

    .compare-table {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
    }

    .compare-head {
      display: grid;
      border-bottom: 1px solid var(--border);
    }

    .compare-cell {
      padding: 20px 24px;
      font-size: .9rem;
    }

    .compare-cell.header {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1rem;
    }

    .compare-row {
      display: grid;
      border-bottom: 1px solid var(--border);
      transition: .2s;
    }

    .compare-row:last-child {
      border-bottom: none;
    }

    .compare-row:hover {
      background: var(--surface2);
    }

    .compare-label {
      font-size: .82rem;
      color: var(--muted);
      font-family: var(--font-mono);
      padding: 16px 24px;
      display: flex;
      align-items: center;
    }

    .meter {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .meter-bar {
      flex: 1;
      height: 6px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
      max-width: 120px;
    }

    .meter-fill {
      height: 100%;
      border-radius: 4px;
    }

    .timeline {
      position: relative;
      margin-top: 32px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 24px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, var(--accent), var(--accent2), transparent);
    }

    .timeline-item {
      display: flex;
      gap: 24px;
      margin-bottom: 32px;
      position: relative;
    }

    .timeline-dot {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-family: var(--font-mono);
      font-size: .75rem;
      z-index: 1;
      position: relative;
      transition: .3s;
    }

    .timeline-dot.active {
      border-color: var(--accent);
      background: rgba(108, 99, 255, 0.15);
      color: var(--accent);
    }

    .timeline-dot.done {
      border-color: var(--accent2);
      background: rgba(0, 212, 170, 0.1);
      color: var(--accent2);
    }

    .timeline-content {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      transition: .3s;
    }

    .timeline-content:hover {
      border-color: rgba(108, 99, 255, 0.25);
    }

    .timeline-phase {
      font-family: var(--font-mono);
      font-size: .7rem;
      color: var(--accent2);
      margin-bottom: 4px;
    }

    .timeline-content h3 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 8px;
    }

    .timeline-content p {
      font-size: .85rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .resource-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .chip {
      padding: 4px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .72rem;
      font-family: var(--font-mono);
      color: var(--muted);
    }

    .slider-group {
      margin-bottom: 24px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: .9rem;
    }

    .slider-label span {
      color: var(--accent);
      font-family: var(--font-mono);
      font-weight: 600;
    }

    input[type=range] {
      width: 100%;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--accent) var(--val, 50%), var(--surface2) var(--val, 50%));
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid var(--bg);
      box-shadow: 0 0 10px rgba(108, 99, 255, 0.5);
    }

    .whatif-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 32px;
    }

    .whatif-result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      transition: .4s;
      position: relative;
      overflow: hidden;
    }

    .whatif-result-card.highlight {
      border-color: rgba(0, 212, 170, 0.4);
    }

    .rank-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 4px 10px;
      background: rgba(245, 200, 66, 0.15);
      border: 1px solid rgba(245, 200, 66, 0.3);
      border-radius: 100px;
      font-size: .7rem;
      font-family: var(--font-mono);
      color: var(--gold);
    }

    .chat-window {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      height: 520px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    const API_BASE = window.NEXUS_API_BASE || "";
    const DEFAULT_AI_MESSAGE = { role: "ai", text: "👋 Hey! I'm **NexusAI**, your personal career mentor. I can help with career choices, learning roadmaps, interview prep, salary negotiation, skill gaps — anything career-related. What's on your mind?", time: "Just now" };

    const safeJsonParse = (text, fallback) => {
      try { return JSON.parse(text); } catch { return fallback; }
    };
    const normalizeUsername = (value) => value.trim().toLowerCase();
    const apiFetch = async (path, { method = "GET", token, body } = {}) => {
      const endpoint = API_BASE ? `${API_BASE}${path}` : path;
      const response = await fetch(endpoint, {
        method,
        cache: "no-store",
        headers: {
          "Content-Type": "application/json",
          "Cache-Control": "no-store",
          Pragma: "no-cache",
          ...(token ? { Authorization: `Bearer ${token}` } : {}),
        },
        body: body ? JSON.stringify(body) : undefined,
      });

      const raw = await response.text();
      const data = raw ? safeJsonParse(raw, {}) : {};
      if (!response.ok) {
        throw new Error(data?.error || data?.message || "Request failed.");
      }
      return data;
    };
    const signupUser = ({ name, username, password }) => apiFetch("/api/auth/signup", { method: "POST", body: { name, username, password } });
    const loginUser = ({ username, password }) => apiFetch("/api/auth/login", { method: "POST", body: { username, password } });

      compareSelected: ["ai-ml", "fullstack", "cybersec"],

      collegeFilters: { type: "all", budget: "all" },
      chatMessages: [DEFAULT_AI_MESSAGE],
    });
    const hydrateUserData = (profile) => {
      const base = createDefaultUserData();
      return {
        ...base,
        ...profile,
        assessmentAnswers: { ...base.assessmentAnswers, ...(profile?.assessmentAnswers || {}) },
        compareSelected: Array.isArray(profile?.compareSelected) && profile.compareSelected.length ? profile.compareSelected : base.compareSelected,
        whatIfPrefs: { ...base.whatIfPrefs, ...(profile?.whatIfPrefs || {}) },
        collegeFilters: { ...base.collegeFilters, ...(profile?.collegeFilters || {}) },

    function LoginPage({ onAuthStart, onAuthSuccess }) {

      const [name, setName] = useState("");
      const [username, setUsername] = useState("");
      const [password, setPassword] = useState("");
      const [error, setError] = useState("");
      const [loading, setLoading] = useState(false);

      const switchMode = (nextMode) => {
        setMode(nextMode);
        setError("");
      };

      const submit = async (e) => {
        e.preventDefault();
        setError("");
        const cleanUsername = normalizeUsername(username);
        const cleanName = name.trim();
        if (!cleanUsername || !password.trim()) {
          setError("Please enter username and password.");
          return;
        }
        if (mode === "signup") {
          if (!cleanName) {
            setError("Please enter your name.");
            return;
          }
        }
        setLoading(true);
        onAuthStart?.();
        try {
          const auth = mode === "signup"
            ? await signupUser({ name: cleanName, username: cleanUsername, password })
            : await loginUser({ username: cleanUsername, password });

          localStorage.setItem(STORAGE_SESSION_KEY, JSON.stringify({ token: auth.token, userId: auth.user?.id || null }));
          localStorage.removeItem(LEGACY_STORAGE_SESSION_KEY);
          const profileRes = await getProfileData(auth.token).catch(() => ({ profile: null }));
          onAuthSuccess({ token: auth.token, user: auth.user, profile: profileRes.profile || null });
        } catch (err) {
          setError(err?.message || "Unable to authenticate right now.");
        } finally {
          setLoading(false);
        }

            <form className="auth-form" onSubmit={submit}>
              {mode === "signup" && (
                <input className="auth-input" placeholder="Full name" value={name} onChange={e => setName(e.target.value)} />

              <button className="btn-primary" type="submit" style={{ width: "100%" }} disabled={loading}>
                {loading ? "Please wait..." : mode === "signup" ? "Create Account" : "Sign In"}
              </button>
            </form>
            <p className="auth-note">
              Account data is secured in the backend database, and your browser only stores a session token.
            </p>
          </div>
        </div>
      );

      "Science (PCM)": "PCM",

    function clampScore(value) {
      return Math.min(99, Math.max(35, Math.round(value)));

    function buildCareerGuidance(answers = {}) {
      const selectedStream = answers[1];
      const mainInterest = answers[2];
      const careerPriority = answers[3];
      const workStyle = answers[5];
      const roleChoice = answers[8];
      const riskLevel = answers[9];

      return CAREERS.map(career => {
        let score = (career.match * 0.52) + (career.demand * 0.28);
        const reasons = [];

        if (selectedStream && career.streams.includes(selectedStream)) {
          score += 18;
          reasons.push(`${STREAM_TAGS[selectedStream] || selectedStream} stream fit`);
        } else if (selectedStream) {
          score -= 12;
        }

        if (mainInterest && career.interests.includes(mainInterest)) {
          score += 14;
          reasons.push("strong interest match");
        }

        if (workStyle && career.interests.includes(workStyle)) {
          score += 9;
          reasons.push("work-style aligned");
        }

        if (roleChoice && career.interests.includes(roleChoice)) {
          score += 8;
        }

        if (careerPriority === "High-demand and future-proof careers") {
          score += (career.demand - 70) * 0.3;
        }

        if (careerPriority === "Salary growth and financial security" && (career.id === "investment-banker" || career.id === "ai-ml" || career.id === "data-sci")) {
          score += 8;
          reasons.push("strong salary upside");
        }

        if (careerPriority === "Creativity and personal expression" && (career.id === "ux-design" || career.id === "digital-marketing")) {
          score += 10;
          reasons.push("creativity-friendly path");
        }

        if (careerPriority === "Social impact and meaningful work" && (career.id === "clinical-psychologist" || career.id === "civil-services")) {
          score += 10;
          reasons.push("high social impact");
        }

        if (riskLevel === "Low risk and stable" && career.growth === "Stable") score += 7;
        if (riskLevel === "High risk, high reward" && career.id === "investment-banker") score += 7;

        return {
          ...career,
          match: clampScore(score),
          guideReason: reasons.slice(0, 2).join(" • ") || "balanced stream-interest-demand fit",
        };
      }).sort((a, b) => b.match - a.match);
    }

    async function askClaude(messages) {
      const res = await fetch("http://localhost:4000/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const message = typeof data?.error === "string" ? data.error : "Chat request failed";
        if (/ANTHROPIC_API_KEY/i.test(message)) {
          return buildOfflineMentorReply(messages);
        }
        throw new Error(message);
      }
      if (typeof data?.error === "string" && /ANTHROPIC_API_KEY/i.test(data.error)) {
        return buildOfflineMentorReply(messages);
      }
      return data.reply || "I couldn't process that. Please try again.";
    }

    function ChatPage({ initialMessages, onMessagesChange }) {
      const [messages, setMessages] = useState(initialMessages?.length ? initialMessages : [DEFAULT_AI_MESSAGE]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const bottomRef = useRef(null);
      const now = () => new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      useEffect(() => { onMessagesChange?.(messages); }, [messages]);
      const send = async (text) => {
        const msg = text || input.trim();
        if (!msg || loading) return;
        setInput("");
        const userMsg = { role: "user", text: msg, time: now() };
        setMessages(m => [...m, userMsg]);
        setLoading(true);
        try {
          const history = messages.slice(-6).map(m => ({ role: m.role === "ai" ? "assistant" : "user", content: m.text }));
          history.push({ role: "user", content: msg });
          const reply = await askClaude(history);
          setMessages(m => [...m, { role: "ai", text: reply, time: now() }]);
        } catch (error) {
          const msg = error?.message ? `I hit an issue: ${error.message}` : "Connection issue. Please try again.";
          setMessages(m => [...m, { role: "ai", text: msg, time: now() }]);
        }
        setLoading(false);
      };
      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, loading]);
      const QUICK = ["What career suits a coder who loves math?", "How do I transition into AI/ML?", "What skills should I learn in 2025?", "How much does a data scientist earn?"];
      const renderText = t => t.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>").replace(/\n/g, "<br/>");
      return (
        <div className="chat-page fade-in">
          <div className="section-label">AI Career Mentor</div>
          <h2 style={{ fontFamily: "var(--font-display)", fontSize: "2rem", fontWeight: 800, letterSpacing: "-1px", marginBottom: 8 }}>Chat with NexusAI</h2>
          <p style={{ color: "var(--muted)", fontSize: ".9rem", marginBottom: 20 }}>Powered by NexusAI mentor engine (Claude + local knowledge base).</p>
          <div className="quick-prompts">{QUICK.map(q => <button key={q} className="quick-prompt" onClick={() => send(q)}>{q}</button>)}</div>
          <div className="chat-window glow">
            <div className="chat-header">
              <div className="chat-avatar">💬</div>
              <div className="chat-header-info"><h4>NexusAI Mentor</h4><p>● Online — responds instantly</p></div>
              <div className="chat-status" />
            </div>
            <div className="chat-messages">
              {messages.map((m, i) => (
                <div key={i} className={`msg ${m.role === "ai" ? "ai" : "user"} fade-in`}>
                  <div className="msg-bubble" dangerouslySetInnerHTML={{ __html: renderText(m.text) }} />
                  <div className="msg-time">{m.time}</div>
                </div>
              ))}
              {loading && (
                <div className="msg ai"><div className="msg-bubble"><div className="typing-indicator"><div className="typing-dot" /><div className="typing-dot" /><div className="typing-dot" /></div></div></div>
              )}
              <div ref={bottomRef} />
            </div>
            <div className="chat-input-area">
              <input className="chat-input" placeholder="Ask anything about your career..." value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === "Enter" && !e.shiftKey && send()} />
              <button className="chat-send" disabled={!input.trim() || loading} onClick={() => send()}>{loading ? <div className="spinner" style={{ width: 18, height: 18 }} /> : "↑"}</button>
            </div>
          </div>
        </div>
      );
    }

      const [authToken, setAuthToken] = useState(null);
      const [authReady, setAuthReady] = useState(false);
      const [userData, setUserData] = useState(createDefaultUserData());

      const resetClientUserState = () => {
        setSubData(null);
        setUserData(createDefaultUserData());
      };

      const clearSessionStorage = () => {
        localStorage.removeItem(STORAGE_SESSION_KEY);
        localStorage.removeItem(LEGACY_STORAGE_SESSION_KEY);
      };

      useEffect(() => {
        let cancelled = false;
        const bootstrap = async () => {
          const savedSession = safeJsonParse(localStorage.getItem(STORAGE_SESSION_KEY) || "{}", {});
          const token = savedSession?.token;
          if (!token) {
            if (!cancelled) {
              setAuthToken(null);
              setCurrentUser(null);
              resetClientUserState();
            }
            if (!cancelled) setAuthReady(true);
            return;
          }

          try {
            const me = await getCurrentUser(token);
            if (savedSession?.userId && Number(savedSession.userId) !== Number(me.user?.id)) {
              throw new Error("Session user mismatch.");
            }
            const profileRes = await getProfileData(token).catch(() => ({ profile: null }));
            const hydrated = hydrateUserData(profileRes.profile || null);

            if (cancelled) return;
            setAuthToken(token);
            setCurrentUser(me.user);
            setUserData(hydrated);
            setSubData(hydrated.subData || null);
          } catch {
            clearSessionStorage();
            if (!cancelled) {
              setAuthToken(null);
              setCurrentUser(null);
              resetClientUserState();
            }
          } finally {
            if (!cancelled) setAuthReady(true);
          }
        };
        bootstrap();
        return () => { cancelled = true; };
      }, []);

      useEffect(() => {
        if (!authReady || !currentUser || !authToken) return;
        const timeoutId = setTimeout(() => {
          saveProfileData(authToken, userData).catch(() => { });
        }, 450);
        return () => clearTimeout(timeoutId);
      }, [authReady, currentUser, authToken, userData]);

      const patchUserData = (patch) => {
        setUserData(prev => ({ ...prev, ...patch }));
      };

      const navigate = (p, data = null) => {
        setPage(p);
        if (data !== null) {
          setSubData(data);
          patchUserData({ subData: data });
        }
        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      const handleAssessmentComplete = (answers) => {
        patchUserData({
          assessed: true,
          assessmentAnswers: answers,
          assessedAt: new Date().toISOString(),
        });
        navigate("dashboard");
      };

      const handleAuthSuccess = ({ token, user, profile }) => {
        resetClientUserState();
        const hydrated = hydrateUserData(profile || null);
        setAuthToken(token);
        setCurrentUser(user);
        setUserData(hydrated);
        setSubData(hydrated.subData || null);
        setPage("home");
      };

      const handleLogout = () => {
        clearSessionStorage();
        setAuthToken(null);
        setCurrentUser(null);
        resetClientUserState();
        setPage("home");
      };

      const NAV_ITEMS = [
        { key: "home", label: "Home" },
        { key: "dashboard", label: "Results" },
        { key: "compare", label: "Compare" },
        { key: "roadmap", label: "Roadmap" },
        { key: "whatif", label: "What-If" },
        { key: "trends", label: "Trends" },
        { key: "journeys", label: "Journeys" },
        { key: "college", label: "Colleges" },
      ];

      if (!authReady) {
        return (
          <div className="noise">
            <div className="login-page">
              <div className="login-card"><p style={{ color: "var(--muted)" }}>Loading your workspace...</p></div>
            </div>
          </div>
        );
      }

      if (!currentUser) {
        return (
          <div className="noise">
            <LoginPage onAuthStart={resetClientUserState} onAuthSuccess={handleAuthSuccess} />
          </div>
        );
      }

      return (
        <div className="noise" key={`user-${currentUser.id}`}>
          <nav>
            <div className="nav-logo">NexusAI</div>
            <div className="nav-links">{NAV_ITEMS.map(n => <button key={n.key} className={`nav-btn${page === n.key ? " active" : ""}`} onClick={() => navigate(n.key)}>{n.label}</button>)}</div>
            <div className="nav-right">
              <span className="nav-user">{currentUser.name}</span>
              <button className="nav-btn nav-cta" onClick={() => navigate("chat")}>💬 AI Mentor</button>
              <button className="nav-btn" onClick={handleLogout}>Logout</button>
            </div>
          </nav>
          {page === "home" && <LandingPage onNavigate={navigate} />}
          {page === "assessment" && <AssessmentPage onComplete={handleAssessmentComplete} initialAnswers={userData.assessmentAnswers} />}
          {page === "dashboard" && <DashboardPage onNavigate={navigate} assessedAt={userData.assessedAt} assessmentAnswers={userData.assessmentAnswers} />}
          {page === "compare" && <ComparisonPage initialSelected={userData.compareSelected} onSelectedChange={selected => patchUserData({ compareSelected: selected })} />}
          {page === "roadmap" && <RoadmapPage careerId={subData || "ai-ml"} />}
          {page === "whatif" && <WhatIfPage initialPrefs={userData.whatIfPrefs} onPrefsChange={prefs => patchUserData({ whatIfPrefs: prefs })} />}
          {page === "chat" && <ChatPage initialMessages={userData.chatMessages} onMessagesChange={messages => patchUserData({ chatMessages: messages })} />}
          {page === "trends" && <TrendsPage />}
          {page === "journeys" && <JourneysPage />}
          {page === "college" && <CollegePage initialFilters={userData.collegeFilters} onFiltersChange={filters => patchUserData({ collegeFilters: filters })} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
